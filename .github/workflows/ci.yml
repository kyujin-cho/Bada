name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: ktlint + detekt
        run: ./gradlew staticAnalysis --refresh-dependencies --stacktrace

      - name: Run :core-protocol JVM tests
        run: ./gradlew :core-protocol:test --stacktrace

      - name: Check :core-protocol Android API 29 compatibility
        run: |
          ./gradlew :core-protocol:jar --stacktrace
          ./scripts/check-core-protocol-android-api29-compat.sh

      - name: Run :discovery-android JVM unit tests
        run: ./gradlew :discovery-android:testDebugUnitTest --stacktrace

      - name: Run :app JVM unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Check bug-report Android API compatibility
        run: ./scripts/check-app-bugreport-api-compat.sh

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
